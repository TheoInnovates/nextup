# NextUp — GitLab CI pipeline.
# Phase 1 wires real lint / type-check / test / build jobs for both apps.
# security-scan + package land in Phases 8/9; deploy is a manual placeholder.

stages:
  - validate
  - lint
  - test
  - build
  - security-scan
  - package
  - deploy

variables:
  UV_VERSION: "0.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

# --- validate ----------------------------------------------------------------
compose-validate:
  stage: validate
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    - cp .env.example .env
    - docker compose config --quiet
    - echo "docker-compose.yml is valid"

# --- reusable backend setup --------------------------------------------------
.api-base: &api-base
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  before_script:
    - cd apps/api
    - uv sync --frozen
  cache:
    key: "uv-$CI_COMMIT_REF_SLUG"
    paths:
      - apps/api/.venv/

# --- reusable frontend setup -------------------------------------------------
.web-base: &web-base
  image: node:22-bookworm-slim
  before_script:
    - cd apps/web
    - npm ci --no-audit --no-fund
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - apps/web/node_modules/

# --- lint --------------------------------------------------------------------
api-lint:
  <<: *api-base
  stage: lint
  script:
    - uv run ruff check .
    - uv run ruff format --check .

api-typecheck:
  <<: *api-base
  stage: lint
  script:
    - uv run mypy app

web-lint:
  <<: *web-base
  stage: lint
  script:
    - npm run lint

web-typecheck:
  <<: *web-base
  stage: lint
  script:
    - npm run typecheck

# --- test --------------------------------------------------------------------
api-test:
  <<: *api-base
  stage: test
  services:
    - name: postgres:16
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_DB: nextup_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: test
    TEST_DATABASE_URL: "postgresql+asyncpg://postgres:test@postgres:5432/nextup_test"
    REDIS_URL: "redis://redis:6379/0"
  script:
    - uv run pytest -q

migration-validate:
  <<: *api-base
  stage: test
  services:
    - name: postgres:16
      alias: postgres
  variables:
    POSTGRES_DB: nextup_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: test
    DATABASE_URL: "postgresql+asyncpg://postgres:test@postgres:5432/nextup_test"
  script:
    # Migrations must apply cleanly on an empty database, then fully reverse.
    - uv run alembic upgrade head
    - uv run alembic downgrade base

web-test:
  <<: *web-base
  stage: test
  script:
    - npm test

# --- build -------------------------------------------------------------------
web-build:
  <<: *web-base
  stage: build
  variables:
    NEXT_TELEMETRY_DISABLED: "1"
  script:
    - npm run build
  artifacts:
    paths:
      - apps/web/.next/
    expire_in: 1 day

api-image:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    - docker build -t nextup-api:$CI_COMMIT_SHORT_SHA apps/api

web-image:
  stage: build
  image: docker:27-cli
  services:
    - docker:27-dind
  script:
    - docker build -t nextup-web:$CI_COMMIT_SHORT_SHA apps/web

# --- security-scan (Phase 8) -------------------------------------------------
# Reported but non-blocking (allow_failure) so a new advisory doesn't break main.
api-dependency-scan:
  stage: security-scan
  image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
  allow_failure: true
  script:
    - cd apps/api
    - uv export --frozen --no-dev --no-emit-project -o requirements.txt
    - uvx pip-audit -r requirements.txt

web-dependency-scan:
  stage: security-scan
  image: node:22-bookworm-slim
  allow_failure: true
  script:
    - cd apps/web
    - npm ci --no-audit --no-fund
    - npm audit --audit-level=high

container-scan:
  stage: security-scan
  image: docker:27-cli
  services:
    - docker:27-dind
  allow_failure: true
  script:
    - docker build -t nextup-api:scan apps/api
    - docker build -t nextup-web:scan apps/web
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest
        image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed nextup-api:scan
    - docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest
        image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed nextup-web:scan

# --- package (Phase 9) -------------------------------------------------------
package:
  stage: package
  rules: [{ if: '$CI_RUN_PACKAGE_JOBS == "true"' }]
  script:
    - echo "TODO Phase 9: push tagged images to registry"

# --- deploy (manual placeholder) ---------------------------------------------
deploy:
  stage: deploy
  when: manual
  script:
    - echo "Deploy target not yet selected."
